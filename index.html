<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SMC // TERMINAL</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@500;700;900&family=Noto+Sans+Thai:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="crt-overlay"></div>

<header>
  <div class="header-left">
    <button class="menu-toggle" id="menuToggle" onclick="toggleSidebar()" aria-label="Toggle menu">▤</button>
    <span class="logo-icon">◈</span>
    <span class="logo-text">SMC<span class="logo-sep">://</span>TERMINAL</span>
  </div>

  <div class="header-search">
    <span class="search-ico">▶</span>
    <input type="text" id="searchInput" placeholder="grep concept...  [ / ]" autocomplete="off"
           oninput="onSearch(this.value)" onfocus="onSearch(this.value)">
    <div class="search-results" id="searchResults"></div>
  </div>

  <div class="header-right">
    <button class="sim-toggle" id="simToggle" onclick="toggleSim()">⚡ SIMULATOR</button>
    <button class="icon-btn" onclick="openGlossary()" title="DICT (G)">📖</button>
    <button class="icon-btn" onclick="openBookmarks()" title="SAVED (B)">⭐</button>
    <div class="progress-wrap">
      <svg class="progress-ring" width="38" height="38" viewBox="0 0 38 38">
        <circle class="ring-bg" cx="19" cy="19" r="16"></circle>
        <circle class="ring-fill" id="ringFill" cx="19" cy="19" r="16"></circle>
      </svg>
      <span class="progress-pct" id="progressPct">0%</span>
    </div>
    <span class="progress-label" id="progressLabel">0 / 28</span>
  </div>
</header>

<div class="layout">
  <div class="sidebar-backdrop" id="sidebarBackdrop" onclick="closeSidebar()"></div>
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-tag">// MODULES.SYS</div>
    <nav id="moduleNav"></nav>
    <div class="sidebar-footer">
      <button class="checklist-trigger" onclick="openChecklist()">
        ▶ PRE-ENTRY CHECKLIST
      </button>
    </div>
  </aside>

  <main class="viewer">
    <div class="slide-meta">
      <span class="slide-module-name" id="slideModuleName"></span>
      <span class="slide-counter" id="slideCounter"></span>
    </div>

    <div class="title-row">
      <h2 class="slide-title" id="slideTitle"></h2>
      <button class="bookmark-btn" id="bookmarkBtn" onclick="toggleBookmark()" title="SAVE SLIDE (F)">☆</button>
    </div>

    <div class="slide-body" id="slideBody">
      <div class="col-main">
        <div class="image-wrapper">
          <span class="corner tl"></span><span class="corner tr"></span>
          <span class="corner bl"></span><span class="corner br"></span>
          <img id="mainImg" src="" alt="" onclick="openLightbox(this.src)">
          <span class="zoom-hint">⛶ EXPAND</span>
        </div>

        <div id="chartSection" class="chart-section"></div>

        <div class="nav-row">
          <button class="nav-btn" id="prevBtn" onclick="navigate(-1)">◄ PREV</button>
          <button class="mark-btn" id="markBtn" onclick="toggleMark()">[ ] MARK AS READ</button>
          <button class="nav-btn" id="nextBtn" onclick="navigate(1)">NEXT ►</button>
        </div>
      </div>

      <div class="col-side">
        <div class="concepts" id="conceptsPanel"></div>

        <div class="notes-panel">
          <div class="notes-head">
            <span>▌ USER_NOTES.log</span>
            <span class="notes-status" id="notesStatus"></span>
          </div>
          <textarea id="notesArea" placeholder="> จดบันทึกแนวคิด ข้อสังเกต หรือ setup ที่อยากจำสำหรับสไลด์นี้..."
                    oninput="onNotesInput()"></textarea>
        </div>
      </div>
    </div>
  </main>
</div>

<!-- ════ TRADING SIMULATOR (toggled view) ════ -->
<main class="sim-view" id="simView"></main>

<!-- Lightbox -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <img id="lightboxImg" src="" alt="">
  <button class="lb-close" onclick="event.stopPropagation(); closeLightbox()">✕</button>
</div>

<!-- Checklist Modal -->
<div class="modal-overlay" id="checklistOverlay" onclick="closeChecklist()">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-hd">
      <h2>▶ PRE-ENTRY CHECKLIST</h2>
      <button onclick="closeChecklist()">✕</button>
    </div>
    <p class="modal-sub">เช็กทุกข้อก่อนกดออเดอร์ — ไม่ครบ = ไม่เข้า!</p>
    <div class="check-progress"><div class="check-progress-fill" id="checkProgressFill"></div></div>
    <ul id="checklistItems"></ul>
    <div class="modal-footer">
      <div class="check-score">PASSED: <span id="checkScore">0</span> / 10</div>
      <button class="reset-btn" onclick="resetChecklist()">⟳ RESET</button>
    </div>
  </div>
</div>

<!-- Glossary Modal -->
<div class="modal-overlay" id="glossaryOverlay" onclick="closeGlossary()">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-hd">
      <h2>📖 SMC_DICTIONARY</h2>
      <button onclick="closeGlossary()">✕</button>
    </div>
    <input type="text" class="gloss-search" id="glossSearch" placeholder="> search term..." oninput="renderGlossaryList(this.value)">
    <div class="gloss-list" id="glossList"></div>
  </div>
</div>

<!-- Bookmarks Modal -->
<div class="modal-overlay" id="bookmarksOverlay" onclick="closeBookmarks()">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-hd">
      <h2>⭐ SAVED_SLIDES</h2>
      <button onclick="closeBookmarks()">✕</button>
    </div>
    <div class="bm-list" id="bmList"></div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script src="chart.js"></script>
<script src="app.js"></script>
<script src="simulator.js"></script>
</body>
</html>
